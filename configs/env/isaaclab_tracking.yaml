# IsaacLab G1 motion tracking

env_type: 'isaaclab'
env_name: 'Isaac-Tracking-Flat-G1-v0'
num_env_steps: ${num_env_steps}

seed: ${seed}
num_train_envs: ${num_train_envs}
num_eval_envs: ${num_eval_envs}
num_record_envs: ${num_record_envs}
rescale_action: null
max_episode_steps: null

# .npz path, list, or directory.
motion:
  motion_files: ???
  balance_mode: frame      # frame | motion
  adaptive_sampling: {kernel_size: 1, lambda: 0.8, uniform_ratio: 0.1, alpha: 0.001}

reward:
  motion_global_anchor_pos: {weight: 1.0, std: 0.3}
  motion_global_anchor_ori: {weight: 0.5, std: 0.4}
  motion_body_pos:          {weight: 2.0, std: 0.3}
  motion_body_ori:          {weight: 1.0, std: 0.4}
  motion_body_lin_vel:      {weight: 1.0, std: 1.0}
  motion_body_ang_vel:      {weight: 1.0, std: 3.14}
  action_rate_l2:           {weight: -1.0}
  joint_limit:              {weight: -10.0}
  undesired_contacts:       {weight: -0.1}

observation:
  policy:
    base_lin_vel: {enabled: true, noise_scale: 1.0}

termination:
  anchor_pos:  {enabled: true, threshold: 0.5}
  anchor_ori:  {enabled: true, threshold: 0.8}
  ee_body_pos: {enabled: true, threshold: 0.25}

robot:
  init_pos: null
  soft_joint_pos_limit_factor: null
  stiffness_scale: null
  damping_scale: null
  effort_limit_scale: null
  armature_scale: null
  velocity_limit_scale: null
  action_scale_scale: null
  groups: null

action_bound:
  type: scalar             # scalar | joint_limit
  fraction: 1.0            # joint_limit only
  mode: symmetric          # symmetric | asymmetric (joint_limit only)

cfg_overrides: null
