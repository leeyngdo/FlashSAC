##################################################################################
# Isaac Lab - Dexsuite Kuka-Allegro Reorient (dexterous manipulation)
##################################################################################

env_type: 'isaaclab'
# State-based local variant: adds object_pos_b (current object position) to the state obs, since
# the stock task only exposes object position via the point-cloud "perception" group.
env_name: 'Isaac-Dexsuite-Kuka-Allegro-Reorient-State-v0'
num_env_steps: ${num_env_steps}

seed: ${seed}
num_train_envs: ${num_train_envs}
num_eval_envs: ${num_eval_envs}
num_record_envs: ${num_record_envs}
rescale_action: null
max_episode_steps: null

# dexsuite splits observations into groups (policy / proprio / perception) and exposes no
# "critic" group. Use the state-based groups: policy (object pos+quat, goal pose, last action)
# and proprio (joint pos/vel, hand-tip state, contact). The point-cloud "perception" group is
# excluded for this state-based SAC setup.
obs_groups: ['policy', 'proprio']

action_bound:
  type: scalar             # scalar | joint_limit
  fraction: 1.0            # joint_limit only
